<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniPublish - Sign In</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-family: 'Inter', sans-serif;
      --bg-color: #0A0A0A;
      --card-bg: rgba(17, 17, 17, 0.85);
      --card-border: rgba(255, 255, 255, 0.06);
      --text-primary: #F3F4F6;
      --text-secondary: #9CA3AF;
      --accent-primary: #F59E0B;
      --accent-danger: #EF4444;
      --input-bg: #0A0A0A;
      --input-border: rgba(255, 255, 255, 0.1);
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: var(--font-family);
      background-color: var(--bg-color);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    /* Background blobs */
    .bg-blobs {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.25;
    }
    .blob-1 {
      top: -10%;
      right: 10%;
      width: 450px;
      height: 450px;
      background: radial-gradient(circle, #F59E0B 0%, #EF4444 100%);
    }
    .blob-2 {
      bottom: -10%;
      left: 10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #D97706 0%, #78350F 100%);
    }
    /* Glass card */
    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      text-align: center;
    }
    .logo-container {
      margin-bottom: 24px;
    }
    .logo-icon {
      font-size: 2.5rem;
      margin-bottom: 8px;
      display: block;
    }
    h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #FFF 30%, var(--accent-primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 30px;
    }
    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-primary);
    }
    input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text-primary);
      font-family: var(--font-family);
      font-size: 0.95rem;
      transition: all 0.25s ease;
    }
    input:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.25);
    }
    .btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent-primary) 0%, #EF4444 100%);
      color: white;
      border: none;
      padding: 14px;
      font-family: var(--font-family);
      font-weight: 700;
      font-size: 1rem;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
      transition: all 0.25s ease;
      margin-top: 10px;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(245, 158, 11, 0.45);
    }
    .alert {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #FCA5A5;
      padding: 12px;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
    }
    .seed-info {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 16px;
    }
    code {
      background: rgba(0,0,0,0.3);
      padding: 2px 6px;
      border-radius: 4px;
      color: #FBBF24;
    }
  </style>
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="login-card">
    <div class="logo-container">
      <h1>OmniPublish</h1>
      <p>Cross-Posting Automation Workspace</p>
    </div>

    <div class="alert" id="error-alert"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" required placeholder="Enter username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn">Sign In to Dashboard</button>
    </form>

    <div class="seed-info">
      Default Admin Login:<br>
      User: <code>superadmin</code> / Pass: <code>superpassword</code>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('login-form');
    const errorAlert = document.getElementById('error-alert');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorAlert.style.display = 'none';

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        
        if (res.ok && data.success) {
          // Redirect to main dashboard
          window.location.href = '/';
        } else {
          errorAlert.textContent = data.error || 'Authentication failed.';
          errorAlert.style.display = 'block';
        }
      } catch (err) {
        errorAlert.textContent = 'Server connection error.';
        errorAlert.style.display = 'block';
      }
    });
  </script>
</body>
</html>
